# Configuration file for `prek`, a git hook framework written in Rust.
# See https://prek.j178.dev for more information.
#
# This file is autogenerated by prek
# To update, run:
#
#    prek update
#
#:schema https://www.schemastore.org/prek.json

[update]
cooldown_days = 7
freeze = true
include_tags = "v*"
exclude_tags = ["*-{alpha,beta,rc}*"]

# Prek Meta
# See https://prek.j178.dev/reference/configuration/#repo-meta for more information and hooks.
[[repos]]
repo = "meta"
hooks = [{ id = "check-useless-excludes" }, { id = "identity" }]

# Prek Builtin
# See https://prek.j178.dev/builtin/ for more information and hooks.
[[repos]]
repo = "builtin"
hooks = [
  { id = "trailing-whitespace" },
  { id = "check-added-large-files" },
  { id = "check-case-conflict" },
  { id = "check-illegal-windows-names" },
  { id = "end-of-file-fixer" },
  { id = "check-json" },
  { id = "check-json5" },
  { id = "pretty-format-json" },
  { id = "check-toml", files = '\.toml(\.tmpl)?$' },
  { id = "check-yaml" },
  { id = "check-xml" },
  { id = "mixed-line-ending" },
  { id = "check-merge-conflict" },
  { id = "detect-private-key" },
  { id = "check-shebang-scripts-are-executable" },
  { id = "check-executables-have-shebangs" },
]

# gitlint
# See https://jorisroovers.com/gitlint/latest/ for more information.
[[repos]]
repo = "https://github.com/jorisroovers/gitlint"
rev = "acc9d9de6369b76d22cb4167029d2035e8730b98" # frozen: v0.19.1

[[repos.hooks]]
id = "gitlint"
stages = ["commit-msg"]
args = [
  "--contrib=CT1",  # Conventional Commits. See https://www.conventionalcommits.org/en/v1.0.0/ for more information.
  "--ignore=B6",    # ignore missing commit body
  "--msg-filename", # pass filename from prek to gitlint
]
